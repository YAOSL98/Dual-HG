#### datasets
datasets:
  dataset: "BRCA"
  wsi_path: "./data/BRCA/testing/images"
  task: "cancer staging"
  train_path: "./TCGA_DATA/splits/42/split_train.txt"
  eval_path: "./TCGA_DATA/splits/42/split_test.txt"
  valid_path: "./TCGA_DATA/splits/42/split_test.txt"
  normal_path: "./TCGA_DATA/tcga_nsclc.txt"
  has_graph: True
  num_workers: 16

#### Checkpoint settings
checkpoint:
  # path: "./checkpoints/test_he_seed3_2/"
  path: "./TCGA_checkpoints/seed42"
  save_checkpoint_freq: 5

#### Patches extractor settings
selector:

  n_channel: 3
  pixel_th: 200

  level: 5
  patch_size: 256
  verbose: 0

#### Optimizer settings
optimizer:
  opt_method: "ADAM"
  lr: 0.0001 # Learning rate
  weight_decay: 0.00001

#### GNN settings
GNN:
  name: "HEAT4"

  n_node_types: 6

  num_meta_paths: 3
  num_layers: 1
  in_dim: 1024
  in_dim_dict:
    node: 1024
    he: 1024
  hidden_dim: 512
  out_dim: 4
  n_heads: 2
  num_out_heads: 1
  feat_drop: 0.2

  graph_pooling_type: mean

#### training settings: learning rate scheme, loss, optimizer
train:
  num_epochs: 300
  batch_size: 1

  loss: "CE"

eval:
  explainer_name: GemExplainer
  explain_path: "./plots/HEAT4_BRCA_full_Kimia_lv0_expl_typing/"